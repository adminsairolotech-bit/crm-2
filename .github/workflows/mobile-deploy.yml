name: 📱 Mobile — OTA Update + Store Build

on:
  push:
    branches:
      - main
  release:
    types: [published]

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: OTA Update — Har push par instant update
  # ─────────────────────────────────────────────
  ota-update:
    name: ⚡ OTA Instant Update (Android + iOS)
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: 🛠️ Setup EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: 📦 Install Dependencies
        run: npm install
        working-directory: mobile

      - name: ⚡ Push OTA Update
        run: |
          eas update \
            --branch production \
            --message "Auto: ${{ github.event.head_commit.message }}" \
            --non-interactive
        working-directory: mobile

      - name: ✅ OTA Complete
        run: |
          echo "OTA UPDATE DONE — Users ko next open par milega"
          echo "By: ${{ github.actor }}"

  # ─────────────────────────────────────────────
  # JOB 2: Android — LOCAL build (no EAS credits needed)
  # GitHub Actions machine par build hota hai
  # ─────────────────────────────────────────────
  build-android:
    name: 🤖 Android — Play Store Submit (Local Build)
    runs-on: ubuntu-latest
    if: github.event_name == 'release'

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 🤖 Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: 📦 Install Android Build Tools & NDK
        run: |
          sdkmanager "build-tools;34.0.0" "platforms;android-34" "ndk;26.3.11579264"
          echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/26.3.11579264" >> $GITHUB_ENV

      - name: 🛠️ Setup EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: 📦 Install Mobile Dependencies
        run: npm install
        working-directory: mobile

      - name: 🔢 Auto-Bump versionCode
        run: |
          cd mobile
          CURRENT=$(jq '.expo.android.versionCode' app.json)
          NEW=$((CURRENT + 1))
          jq ".expo.android.versionCode = $NEW" app.json > app.json.tmp && mv app.json.tmp app.json
          echo "versionCode: $CURRENT → $NEW"

      - name: 🔑 Google Service Account Setup
        run: |
          echo '${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}' > mobile/google-service-account.json

      - name: 🔨 Build Android AAB (Local — GitHub Machine par)
        run: |
          eas build \
            --platform android \
            --profile production \
            --non-interactive \
            --local \
            --output ./android-release.aab
        working-directory: mobile
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}

      - name: 🚀 Submit to Play Store (Production)
        run: |
          eas submit \
            --platform android \
            --path ./android-release.aab \
            --non-interactive
        working-directory: mobile

      - name: 🧹 Cleanup
        run: rm -f mobile/google-service-account.json mobile/android-release.aab
        if: always()

      - name: ✅ Play Store Done
        run: echo "Android AAB submitted to Play Store!"

  # ─────────────────────────────────────────────
  # JOB 3: App Store — Release publish par
  # ─────────────────────────────────────────────
  build-ios:
    name: 🍎 iOS — App Store Submit
    runs-on: ubuntu-latest
    if: github.event_name == 'release'

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 🛠️ Setup EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: 📦 Install Dependencies
        run: npm install
        working-directory: mobile

      - name: 🔨 Build iOS
        run: eas build --platform ios --profile production --non-interactive
        working-directory: mobile

      - name: 🚀 Submit to App Store
        run: eas submit --platform ios --latest --non-interactive
        working-directory: mobile
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          ASC_APP_ID: ${{ secrets.ASC_APP_ID }}

      - name: ✅ App Store Done
        run: echo "iOS submitted to App Store!"
