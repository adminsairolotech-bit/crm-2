name: "\U0001F4F1 Mobile — Play Store Build & Submit"

on:
  release:
    types: [published]

jobs:
  build-android:
    name: "\U0001F916 Android — Build AAB"
    runs-on: ubuntu-latest

    steps:
      - name: "\u2B07\uFE0F Checkout"
        uses: actions/checkout@v4

      - name: "\u2699\uFE0F Setup Node.js"
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: mobile/package-lock.json

      - name: "\u2615 Setup Java 17"
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: "\U0001F916 Setup Android SDK"
        uses: android-actions/setup-android@v3

      - name: "\U0001F4E6 Install Android Build Tools & NDK"
        run: |
          sdkmanager --licenses <<< "y
          y
          y
          y
          y
          y
          y"
          sdkmanager "build-tools;35.0.0" "platforms;android-35" "ndk;26.3.11579264"
          echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/26.3.11579264" >> $GITHUB_ENV

      - name: "\U0001F6E0\uFE0F Setup EAS CLI"
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: "\U0001F4E6 Install Mobile Dependencies"
        run: npm install
        working-directory: mobile

      - name: "\U0001F522 Auto-Bump versionCode"
        run: |
          cd mobile
          CURRENT=$(jq '.expo.android.versionCode' app.json)
          NEW=$((CURRENT + 1))
          jq ".expo.android.versionCode = $NEW" app.json > app.json.tmp && mv app.json.tmp app.json
          echo "versionCode: $CURRENT → $NEW"
          echo "VERSION_CODE=$NEW" >> $GITHUB_ENV
          echo "✅ VERSION_CODE set to $NEW for EAS build"

      - name: "\U0001F3D7\uFE0F Expo Prebuild — Generate Android Project"
        run: |
          export VERSION_CODE=${{ env.VERSION_CODE }}
          npx expo prebuild --clean --platform android --non-interactive
          echo "✅ Android project generated"
          ls -la android/app/ | head -10
        working-directory: mobile

      - name: "\U0001F527 Force Kotlin 1.9.25 via Gradle Init Script"
        run: |
          mkdir -p ~/.gradle
          cat > ~/.gradle/init.gradle << 'INITEOF'
          allprojects {
            buildscript {
              configurations.all {
                resolutionStrategy.eachDependency { DependencyResolveDetails details ->
                  if (details.requested.group == 'org.jetbrains.kotlin') {
                    details.useVersion '1.9.25'
                    details.because 'Force Kotlin 1.9.25 for Compose Compiler 1.5.15 compatibility'
                  }
                }
              }
            }
            configurations.all {
              resolutionStrategy.eachDependency { DependencyResolveDetails details ->
                if (details.requested.group == 'org.jetbrains.kotlin') {
                  details.useVersion '1.9.25'
                  details.because 'Force Kotlin 1.9.25 for Compose Compiler 1.5.15 compatibility'
                }
              }
            }
          }
          INITEOF

      - name: "\U0001F511 Setup Upload Keystore"
        run: |
          cd mobile/android/app
          if [ -n "${{ secrets.UPLOAD_KEYSTORE_BASE64 }}" ]; then
            echo "Using stored keystore from secrets"
            echo "${{ secrets.UPLOAD_KEYSTORE_BASE64 }}" | base64 -d > upload-keystore.jks
          else
            echo "Generating new upload keystore"
            keytool -genkeypair \
              -v \
              -keystore upload-keystore.jks \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -storepass sairolotech2026 \
              -keypass sairolotech2026 \
              -alias upload \
              -dname "CN=SAI RoloTech, OU=Mobile, O=SAI RoloTech, L=Delhi, S=Delhi, C=IN"
            echo "⚠️ New keystore generated — store as GitHub secret for future builds"
            base64 -w 0 upload-keystore.jks > /tmp/keystore-base64.txt
            echo "Keystore base64 length: $(wc -c < /tmp/keystore-base64.txt)"
          fi
          echo "✅ Keystore ready"

      - name: "\U0001F4DD Configure Signing in build.gradle"
        run: |
          cd mobile/android/app

          STORE_PASS="${{ secrets.KEYSTORE_PASSWORD }}"
          KEY_PASS="${{ secrets.KEY_PASSWORD }}"
          [ -z "$STORE_PASS" ] && STORE_PASS="sairolotech2026"
          [ -z "$KEY_PASS" ] && KEY_PASS="sairolotech2026"

          cat > signing.gradle << SIGNEOF
          android {
            signingConfigs {
              release {
                storeFile file("upload-keystore.jks")
                storePassword "$STORE_PASS"
                keyAlias "upload"
                keyPassword "$KEY_PASS"
              }
            }
            buildTypes {
              release {
                signingConfig signingConfigs.release
              }
            }
          }
          SIGNEOF

          echo 'apply from: "signing.gradle"' >> build.gradle
          echo "✅ Signing config applied"

      - name: "\U0001F528 Build Android AAB with Gradle"
        run: |
          cd mobile/android
          chmod +x gradlew
          ./gradlew bundleRelease --no-daemon --warning-mode=all
          echo "✅ AAB build complete"
          ls -lh app/build/outputs/bundle/release/
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
          ORG_GRADLE_PROJECT_kotlinVersion: "1.9.25"

      - name: "\U0001F4E6 Prepare AAB for upload"
        run: |
          cp mobile/android/app/build/outputs/bundle/release/app-release.aab mobile/android-release.aab
          echo "AAB size: $(du -h mobile/android-release.aab | cut -f1)"

      - name: "\U0001F4E4 Upload AAB as Artifact"
        uses: actions/upload-artifact@v4
        with:
          name: android-release-aab
          path: mobile/android-release.aab
          retention-days: 30

      - name: "\U0001F680 Upload AAB to GitHub Release"
        run: |
          TAG="${{ github.event.release.tag_name }}"
          RELEASE_ID="${{ github.event.release.id }}"
          cd mobile
          zip -j "android-release-v${TAG}.zip" android-release.aab
          curl -s -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/zip" \
            --data-binary @"android-release-v${TAG}.zip" \
            "https://uploads.github.com/repos/${{ github.repository }}/releases/${RELEASE_ID}/assets?name=android-release-v${TAG}.zip"
          echo "✅ AAB uploaded to GitHub release $TAG"

      - name: "\U0001F9F9 Cleanup"
        run: |
          rm -f mobile/google-service-account.json
          rm -f mobile/android-release.aab
          rm -f mobile/android/app/upload-keystore.jks
        if: always()

      - name: "\u2705 Done"
        run: echo "Android AAB built and uploaded to GitHub release!"
