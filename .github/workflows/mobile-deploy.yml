name: 📱 Mobile — Play Store Build & Submit

on:
  release:
    types: [published]

jobs:
  # ─────────────────────────────────────────────
  # Android — LOCAL build on GitHub machine
  # No EAS cloud credits used for build
  # ─────────────────────────────────────────────
  build-android:
    name: 🤖 Android — Play Store Submit
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 🤖 Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: 📦 Install Android Build Tools & NDK
        run: |
          sdkmanager --licenses <<< "y
          y
          y
          y
          y
          y
          y"
          sdkmanager "build-tools;35.0.0" "platforms;android-35" "ndk;26.3.11579264"
          echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/26.3.11579264" >> $GITHUB_ENV

      - name: 🛠️ Setup EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: 📦 Install Mobile Dependencies
        run: npm install
        working-directory: mobile

      - name: 🔢 Auto-Bump versionCode
        run: |
          cd mobile
          CURRENT=$(jq '.expo.android.versionCode' app.json)
          NEW=$((CURRENT + 1))
          jq ".expo.android.versionCode = $NEW" app.json > app.json.tmp && mv app.json.tmp app.json
          echo "versionCode: $CURRENT → $NEW"
          echo "VERSION_CODE=$NEW" >> $GITHUB_ENV
          echo "✅ VERSION_CODE set to $NEW for EAS build"

      - name: 🔑 Google Service Account Setup
        run: |
          echo '${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}' > mobile/google-service-account.json

      - name: 🔧 Force Kotlin 1.9.25 via Gradle Init Script
        run: |
          mkdir -p ~/.gradle
          cat > ~/.gradle/init.gradle << 'INITEOF'
          allprojects {
            buildscript {
              configurations.all {
                resolutionStrategy.eachDependency { DependencyResolveDetails details ->
                  if (details.requested.group == 'org.jetbrains.kotlin') {
                    details.useVersion '1.9.25'
                    details.because 'Force Kotlin 1.9.25 for Compose Compiler 1.5.15 compatibility'
                  }
                }
              }
            }
            configurations.all {
              resolutionStrategy.eachDependency { DependencyResolveDetails details ->
                if (details.requested.group == 'org.jetbrains.kotlin') {
                  details.useVersion '1.9.25'
                  details.because 'Force Kotlin 1.9.25 for Compose Compiler 1.5.15 compatibility'
                }
              }
            }
          }
          INITEOF
          echo "Gradle init script created"
          cat ~/.gradle/init.gradle

      - name: 🔨 Build Android AAB (Local Build — No Cloud Credits)
        run: |
          echo "🔢 Building with VERSION_CODE=$VERSION_CODE"
          eas build \
            --platform android \
            --profile production \
            --non-interactive \
            --local \
            --output ./android-release.aab
        working-directory: mobile
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
          EXPO_NO_EXPO_UPDATES: "1"
          ORG_GRADLE_PROJECT_kotlinVersion: "1.9.25"
          VERSION_CODE: ${{ env.VERSION_CODE }}

      - name: 📤 Upload AAB as Artifact (backup)
        uses: actions/upload-artifact@v4
        with:
          name: android-release-aab
          path: mobile/android-release.aab
          retention-days: 7

      - name: 🚀 Submit to Play Store (Production)
        run: |
          eas submit \
            --platform android \
            --path ./android-release.aab \
            --non-interactive
        working-directory: mobile

      - name: 🧹 Cleanup
        run: |
          rm -f mobile/google-service-account.json
          rm -f mobile/android-release.aab
        if: always()

      - name: ✅ Done
        run: echo "Android submitted to Play Store!"
